name: Deploy flagship demos

on:
  push:
    branches: [main]
    paths:
      - "examples/repolis-hero/**"
      - "examples/brick-offroad-hero/**"
      - "examples/showcase/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/deploy-repolis-hero.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            examples/repolis-hero/package-lock.json
            examples/brick-offroad-hero/package-lock.json
            examples/showcase/package-lock.json
      - name: Install Repolis dependencies
        working-directory: examples/repolis-hero
        run: npm ci
      - name: Build Repolis root
        working-directory: examples/repolis-hero
        run: npm run build
      - name: Install Brick dependencies
        working-directory: examples/brick-offroad-hero
        run: npm ci
      - name: Install showcase dependencies
        working-directory: examples/showcase
        run: npm ci
      - name: Run release tests and evidence gate
        run: |
          python3 -m unittest discover -s tests -q
          python3 scripts/verify_release.py
      - name: Build Brick route
        working-directory: examples/brick-offroad-hero
        run: npm run build
      - name: Test Brick capture isolation
        working-directory: examples/brick-offroad-hero
        run: npm run test:capture
      - name: Build showcase
        working-directory: examples/showcase
        run: npm run build
      - name: Assemble Pages artifact
        run: |
          mkdir -p pages/brick pages/showcase
          cp -R examples/repolis-hero/dist/. pages/
          cp -R examples/brick-offroad-hero/dist/. pages/brick/
          cp -R examples/showcase/dist/. pages/showcase/
          diff -qr examples/repolis-hero/dist pages --exclude brick --exclude showcase
          diff -qr examples/brick-offroad-hero/dist pages/brick
          diff -qr examples/showcase/dist pages/showcase
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
