<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>threejs-sculpt-dna social preview</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        position: relative;
        color: #f5f7f8;
        background:
          radial-gradient(circle at 70% 40%, rgba(50, 204, 215, 0.18), transparent 32%),
          radial-gradient(circle at 44% 76%, rgba(255, 172, 66, 0.14), transparent 28%),
          linear-gradient(135deg, #071622, #02070c 76%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .hero {
        position: absolute;
        inset: 0 0 0 39%;
        overflow: hidden;
      }
      .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 64% center;
        filter: saturate(1.08) contrast(1.04);
      }
      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, #071622 0%, rgba(7, 22, 34, 0.75) 13%, transparent 52%);
      }
      .content {
        position: relative;
        z-index: 2;
        width: 690px;
        padding: 62px 0 0 70px;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 32px;
        color: #70e4e9;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        color: #071622;
        background: linear-gradient(135deg, #ffd06b, #49dce7);
        font-size: 22px;
      }
      h1 {
        margin: 0;
        font-size: 64px;
        line-height: 0.96;
        letter-spacing: -0.055em;
      }
      .subtitle {
        margin: 18px 0 0;
        color: #d5e1e3;
        font-size: 25px;
        font-weight: 500;
      }
      .flow {
        margin-top: 38px;
        color: #a8b9bd;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 15px;
        letter-spacing: 0.04em;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        margin-top: 26px;
      }
      .chip {
        padding: 8px 11px;
        border: 1px solid rgba(214, 231, 232, 0.18);
        border-radius: 999px;
        color: #d8e5e6;
        background: rgba(8, 21, 29, 0.62);
        font-size: 12px;
      }
      .footer {
        position: absolute;
        z-index: 3;
        left: 70px;
        bottom: 40px;
        color: #7f979b;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <img src="../../examples/repolis-hero/evidence/final.webp" alt="" />
    </div>
    <main class="content">
      <div class="eyebrow"><span class="mark">✦</span> GitHub Copilot Plugin</div>
      <h1>threejs-<br />sculpt-dna</h1>
      <p class="subtitle">Code-native procedural 3D families</p>
      <p class="flow">Reference → Sculpt DNA variants → Flagship</p>
      <div class="chips">
        <span class="chip">0 imported meshes</span>
        <span class="chip">Coverage Curator</span>
        <span class="chip">Evidence-backed passes</span>
        <span class="chip">Three.js</span>
      </div>
    </main>
    <footer class="footer">github.com/hyeonsangjeon/threejs-sculpt-dna</footer>
  </body>
</html>
