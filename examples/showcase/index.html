<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js Sculpt DNA Showcase</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #071019; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      canvas { display: block; width: 100%; height: 100%; }
      .label {
        position: fixed;
        left: 28px;
        bottom: 24px;
        color: #f7fafc;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.8);
        pointer-events: none;
      }
      .label strong { display: block; font-size: 24px; letter-spacing: 0.02em; }
      .label span { display: block; margin-top: 5px; color: #b7c7d8; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; }
      .badge {
        position: fixed;
        right: 24px;
        top: 22px;
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        color: #d9e6f2;
        background: rgba(7, 16, 25, 0.55);
        backdrop-filter: blur(8px);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="label">
      <strong id="title">Sculpt DNA</strong>
      <span id="subtitle">Loading deterministic variants</span>
    </div>
    <div class="badge">Coverage Curator · 24 → 3</div>
    <script type="module" src="./showcase.js"></script>
  </body>
</html>
